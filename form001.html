<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário BYD</title>
</head>

<body>

<form action="cadastro.php" method="post" autocomplete="on">

<fieldset>
<legend>Dados Pessoais</legend>

<label for="nome">Nome:</label><br>
<input type="text" id="nome" name="nome" placeholder="Nome completo" required><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email" placeholder="Digite seu email" required
       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
       title="Digite um email válido, exemplo: usuario@dominio.com"><br><br>

<label for="telefone">Telefone (formato (XX)XXXXX-XXXX):</label><br>
<input type="tel" id="telefone" name="telefone" placeholder="(11)91234-5678" required
       pattern="\([0-9]{2}\)[0-9]{4,5}-[0-9]{4}"
       title="Digite um telefone válido no formato (XX)XXXXX-XXXX"><br><br>

<label for="senha">Crie uma senha:</label><br>
<input type="password" id="senha" name="senha" placeholder="Digite sua senha" required
       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,}"
       title="A senha deve ter pelo menos 6 caracteres, incluindo letras maiúsculas, minúsculas e números"><br><br>

<label for="idade">Idade:</label><br>
<input type="number" id="idade" name="idade" placeholder="Sua idade" min="18" max="120" required
       title="Informe uma idade válida, mínimo 18 anos"><br><br>

<label for="estado">Estado de entrega:</label><br>
<select id="estado" name="estado" required>
<option value="">Selecione seu estado</option>

<optgroup label="Norte">
<option>Acre</option>
<option>Amapá</option>
<option>Amazonas</option>
<option>Pará</option>
<option>Rondônia</option>
<option>Roraima</option>
<option>Tocantins</option>
</optgroup>

<optgroup label="Nordeste">
<option>Alagoas</option>
<option>Bahia</option>
<option>Ceará</option>
<option>Maranhão</option>
<option>Paraíba</option>
<option>Pernambuco</option>
<option>Piauí</option>
<option>Rio Grande do Norte</option>
<option>Sergipe</option>
</optgroup>

<optgroup label="Centro-Oeste">
<option>Distrito Federal</option>
<option>Goiás</option>
<option>Mato Grosso</option>
<option>Mato Grosso do Sul</option>
</optgroup>

<optgroup label="Sudeste">
<option>Espírito Santo</option>
<option>Minas Gerais</option>
<option>Rio de Janeiro</option>
<option>São Paulo</option>
</optgroup>

<optgroup label="Sul">
<option>Paraná</option>
<option>Santa Catarina</option>
<option>Rio Grande do Sul</option>
</optgroup>

</select><br><br>

<label for="cnh">Foto da CNH:</label><br>
<input type="file" id="cnh" name="cnh" accept="image/*" required>

</fieldset>

<br>

<fieldset>
<legend>Escolha do Carro</legend>

<input type="radio" id="seal" name="carro" value="Seal" required>
<label for="seal">BYD Seal</label><br>

<input type="radio" id="han" name="carro" value="Han">
<label for="han">BYD Han</label><br>

<input type="radio" id="songplus" name="carro" value="Song Plus">
<label for="songplus">BYD Song Plus</label><br><br>

Itens adicionais:<br><br>

<input type="checkbox" id="som" name="itens[]" value="Som Premium">
<label for="som">Som Premium</label><br>

<input type="checkbox" id="ar" name="itens[]" value="Ar-condicionado Digital">
<label for="ar">Ar-condicionado Digital</label><br>

<input type="checkbox" id="camera" name="itens[]" value="Câmera 360°">
<label for="camera">Câmera 360°</label><br><br>

<label for="cor">Cor:</label>
<input type="color" id="cor" name="cor" required><br><br>

<label for="intensidade">Intensidade:</label>
<input type="range" id="intensidade" name="intensidade" min="0" max="100" value="50">

</fieldset>

<br>

<fieldset>
<legend>Entrega</legend>

<label for="data">Data:</label>
<input type="date" id="data" name="data" required><br><br>

<label for="hora">Hora:</label>
<input type="time" id="hora" name="hora" required><br><br>

<label for="mes">Mês:</label>
<input type="month" id="mes" name="mes" required>

</fieldset>

<br>

<fieldset>
<legend>Sua Opinião</legend>

<label for="opiniao">Comentário:</label><br>
<textarea id="opiniao" name="opiniao" rows="5" cols="50" placeholder="Exemplo: Espero que o carro tenha uma boa autonomia, seja confortável, silencioso e impressione os vizinhos!" required></textarea>

</fieldset>

<br>

<fieldset>
<legend>Avaliação</legend>

<label for="dolphin">BYD Dolphin Plus:</label>
<input type="number" id="dolphin" name="dolphin" min="0" max="5" placeholder="0 a 5" required><br><br>

<label for="gs">BYD GS:</label>
<input type="number" id="gs" name="gs" min="0" max="5" placeholder="0 a 5" required><br><br>

<label for="mini">BYD Mini:</label>
<input type="number" id="mini" name="mini" min="0" max="5" placeholder="0 a 5" required>

</fieldset>

<br>

<input type="submit" value="Enviar">
<input type="reset" value="Limpar">

</form>

</body>
</html>
